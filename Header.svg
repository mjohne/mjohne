  <line class="hcl3" x1="820" y1="125" x2="940" y2="112" stroke="#63b3ed" stroke-width="0.6"/>
  <line class="hcl2" x1="940" y1="112" x2="1050" y2="130" stroke="#63b3ed" stroke-width="0.6"/>

