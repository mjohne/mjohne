<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 160" width="100%">
  <defs>
    <linearGradient id="hbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#02050d"/>
      <stop offset="50%"  stop-color="#060d1f"/>
      <stop offset="100%" stop-color="#02050d"/>
    </linearGradient>
    <radialGradient id="hglow_center" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#0d2a4a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#02050d"  stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hfade_bot" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#e6b450" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#e6b450" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#e6b450" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="hgold_h" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#e6b450" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#e6b450" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#e6b450" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="hblue_h" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#63b3ed" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#63b3ed" stop-opacity="0.5"/>
      <stop offset="70%"  stop-color="#4299e1" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#4299e1" stop-opacity="0"/>
    </linearGradient>
    <filter id="fglow_s">
      <feGaussianBlur stdDeviation="2"  result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fglow_m">
      <feGaussianBlur stdDeviation="5"  result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fglow_l">
      <feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fglow_xl">
      <feGaussianBlur stdDeviation="18" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <style>
      /* tiny background stars twinkle */
      .hts { animation: htwinkle var(--d,4s) ease-in-out infinite var(--delay,0s); }
      @keyframes htwinkle {
        0%,100% { opacity: var(--lo, 0.1); }
        50%     { opacity: var(--hi, 0.9); }
      }

      /* constellation nodes pulse */
      .hcn { animation: hcnpulse var(--d,3s) ease-in-out infinite var(--delay,0s); }
      @keyframes hcnpulse {
        0%,100% { opacity:0.2; r:var(--r1,2px); }
        50%     { opacity:1.0; r:var(--r2,4px); }
      }

      /* gold star nodes */
      .hgs { animation: hgspulse var(--d,4s) ease-in-out infinite var(--delay,0s); }
      @keyframes hgspulse {
        0%,100% { opacity:0.3; }
        50%     { opacity:1.0; }
      }

      /* constellation lines breathe in groups */
      .hcl1 { animation: hclb 5s ease-in-out infinite 0s;   }
      .hcl2 { animation: hclb 5s ease-in-out infinite 1s;   }
      .hcl3 { animation: hclb 5s ease-in-out infinite 2s;   }
      .hcl4 { animation: hclb 5s ease-in-out infinite 3s;   }
      .hcl5 { animation: hclb 5s ease-in-out infinite 4s;   }
      @keyframes hclb {
        0%,100% { opacity:0.08; }
        50%     { opacity:0.45; }
      }

      /* shooting star */
      .hshot1 { animation: hshoot1 8s linear infinite 1s;  }
      .hshot2 { animation: hshoot2 8s linear infinite 5s;  }
      @keyframes hshoot1 {
        0%   { transform:translate(0,0);      opacity:0; }
        2%   { opacity:1; }
        12%  { transform:translate(320px,-80px); opacity:0; }
        100% { transform:translate(320px,-80px); opacity:0; }
      }
      @keyframes hshoot2 {
        0%   { transform:translate(0,0);        opacity:0; }
        2%   { opacity:0.8; }
        12%  { transform:translate(-280px,-70px); opacity:0; }
        100% { transform:translate(-280px,-70px); opacity:0; }
      }

      /* nebula pulse */
      .hneb { animation: hnebpulse 9s ease-in-out infinite; }
      @keyframes hnebpulse {
        0%,100% { opacity:0.04; }
        50%     { opacity:0.12; }
      }

      /* gold horizon line pulse */
      .hghl { animation: hghpulse 6s ease-in-out infinite; }
      @keyframes hghpulse {
        0%,100% { opacity:0.6; }
        50%     { opacity:1.0; }
      }

      /* bottom gold fade bar */
      .hgbar { animation: hgbarpulse 4s ease-in-out infinite; }
      @keyframes hgbarpulse {
        0%,100% { opacity:0.7; }
        50%     { opacity:1.0; }
      }
    </style>
  </defs>

  <!-- BG -->
  <rect width="1200" height="160" fill="url(#hbg)"/>

  <!-- Nebula center glow -->
  <ellipse class="hneb" cx="600" cy="80" rx="380" ry="70" fill="url(#hglow_center)"/>

