  <circle class="hts" style="--d:4.3s;--delay:1.3s;--lo:0.06;--hi:0.5" cx="680"  cy="28"  r="0.9" fill="white"/>
  <circle class="hts" style="--d:2.8s;--delay:0.9s;--lo:0.1; --hi:0.9" cx="720"  cy="138" r="0.7" fill="white"/>
  <circle class="hts" style="--d:5.5s;--delay:2.2s;--lo:0.05;--hi:0.6" cx="760"  cy="15"  r="0.8" fill="white"/>
