  <line class="hcl3" x1="395" y1="45"  x2="480" y2="98"  stroke="#63b3ed" stroke-width="0.7"/>
  <line class="hcl3" x1="480" y1="98"  x2="540" y2="62"  stroke="#63b3ed" stroke-width="0.7"/>
  <!-- center cross -->
